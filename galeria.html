<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Galería | Secundaria 61</title>

    <link rel="stylesheet" href="CSS/estilo.css">
</head>

<body>

    <!-- BANNER DE GALERÍA -->

    <header class="banner-escuela">

        <img
            src="img/galeria.png"
            alt="Actividades de la Escuela Secundaria General No. 61"
        >

        <div class="titulo-banner">
            <h1>Galería</h1>

            <p>
                Conoce algunos momentos de nuestra comunidad escolar.
            </p>
        </div>

    </header>


    <!-- REGRESAR AL INICIO -->

    <a href="index.html" class="volver">
        ← Regresar al inicio
    </a>


    <!-- CONTENIDO PRINCIPAL -->

    <main class="pagina-galeria">

        <h1>Vida escolar</h1>

        <p class="introduccion-galeria">
            En esta sección compartimos actividades académicas,
            culturales, deportivas y comunitarias realizadas en la escuela.
        </p>


        <!-- CUADRÍCULA DE FOTOGRAFÍAS -->

        <section class="cuadricula-galeria">

            <figure class="foto-galeria">

                <img
                    src="img/galeria/patio.jpg"
                    alt="Patio principal de la escuela"
                >

                <figcaption>
                    Patio principal
                </figcaption>

            </figure>


            <figure class="foto-galeria">

                <img
                    src="img/galeria/biblioteca.jpg"
                    alt="Biblioteca de la escuela"
                >

                <figcaption>
                    Biblioteca escolar
                </figcaption>

            </figure>


            <figure class="foto-galeria">

                <img
                    src="img/galeria/actividad.jpg"
                    alt="Actividad académica de los alumnos"
                >

                <figcaption>
                    Actividades académicas
                </figcaption>

            </figure>


            <figure class="foto-galeria">

                <img
                    src="img/galeria/deportes.jpg"
                    alt="Actividad deportiva en la escuela"
                >

                <figcaption>
                    Actividades deportivas
                </figcaption>

            </figure>


            <figure class="foto-galeria">

                <img
                    src="img/galeria/cultura.jpg"
                    alt="Actividad cultural escolar"
                >

                <figcaption>
                    Actividades culturales
                </figcaption>

            </figure>


            <figure class="foto-galeria">

                <img
                    src="img/galeria/comunidad.jpg"
                    alt="Comunidad escolar"
                >

                <figcaption>
                    Nuestra comunidad
                </figcaption>

            </figure>

        </section>

    </main>

</body>

</html>
